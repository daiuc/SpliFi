
[spacer]
height = 0.25

[scale]
title = {{ title }}
height = 0.1
#line_width = 0.4
where = right
fontsize = 4
file_type = scalebar

[spacer]
height = 0.25

[{{ allele0_N }}]
bw_file = {{ bw0 }}
link_file = {{ lnk0_N }}
title = 0
height = 1
bw_color = darkblue
number_of_bins = 7000
max_value = 12
#operation = log(bw_file + 1)
nans_to_zeros = true
summary_method = mean
show_data_range = true
link_color = darkblue
line_style = solid
fontsize = 4
#line_width = 0.4
scale_link_height = 0.5
scale_line_width = 3
show_number = false
file_type = sashimiBigWig


